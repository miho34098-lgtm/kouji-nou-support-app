name: Notification Check

# NotificationCheckJob（旧CW-01 Cloudflare Worker）: SDD.md ADR-010参照
# GitHub Actionsのschedule最短間隔は5分（1分間隔だったCloudflare Workersより粗い、research_v2.md Round3参照）
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # 手動実行 + 60日間隔での自動無効化を防ぐキープアライブ用

jobs:
  check-notifications:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # H1 DRY_RUN: デフォルトtrue。本番運用時はリポジトリ変数 DRY_RUN=false を設定する（HARNESS.md参照）
      - run: npx tsx scripts/runCheckNotifications.ts
        env:
          DRY_RUN: ${{ vars.DRY_RUN || 'true' }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ vars.VAPID_SUBJECT }}
